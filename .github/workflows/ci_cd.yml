name: Spring Boot CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Build Docker image
      run: docker build -t minha-api .

    - name: Run Docker container
      run: |
        docker run -d \
          -p 8080:8080 \
          -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          -e JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION }}" \
          minha-api

    - name: Test application health
      run: |
        echo "Aguardando a API ficar online (Health Check)..."
        timeout 40 bash -c 'until curl -f -s http://localhost:8080/actuator/health > /dev/null; do echo "Aguardando..."; sleep 2; done'
        echo "API inicializada com sucesso!"